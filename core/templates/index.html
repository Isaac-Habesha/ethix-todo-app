<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>ethix</title>
  </head>
  <body>
    <h1 class="text-5xl font-bold text-center text-sky-500 underline mt-12">
      my todo app
    </h1>
    <form action="{% url 'core:create_todo' %}" method="POST" class="w-1/3 mx-auto flex justify-center mt-20 my-10 gap-4">
      {% csrf_token %}
      <input
        class="flex-1 text-lg text-blue-600 bg-gray-100 rounded-lg px-4 py-1 border border-2 border-sky-400"
        type="text"
        name="title"
        placeholder="add new todo"
        required
      />
      <input type="hidden" name="description" value="" />
      <button type="submit" class="bg-orange-500 px-6 py-2 rounded-xl font-bold text-lg">
        Add
      </button>
    </form>
    {% comment %} todos {% endcomment %}
    <div class="w-1/3 mx-auto">
      {% for t in todo_lists %}
      <div class="flex gap-2 items-center mt-4 bg-gray-100 py-3 px-4 bg-sky-100 rounded-lg justify-between">
        <a href="{% url 'core:get_todo_by_id' t.id %}" class="flex gap-2 items-center flex-1">
          <input class="h-5 w-5" type="checkbox" />
          {% comment %} title {% endcomment %}
          <p class="text-2xl font-medium">{{t.title}}-{{t.id}}</p>
        </a>
        <form action="{% url 'core:delete_todo' t.id %}" method="POST" class="m-0 p-0">
          {% csrf_token %}
          <button type="submit" class="bg-red-500 text-white px-3 py-1 rounded-md">Delete</button>
        </form>
      </div>
      {% endfor %}
    </div>
  </body>
</html>
